name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.24", "1.25", "1.26"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: make build

      - name: Test
        run: make test

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install tools
        run: make tools

      - name: Audit
        run: make audit

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate coverage
        run: go test -short -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install commitlint
        run: go install github.com/conventionalcommit/commitlint@v0.12.0

      - name: Lint PR commit messages
        run: |
          FAIL=0
          for sha in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
            MSG=$(git log -1 --format=%B "$sha")
            if ! echo "$MSG" | commitlint lint; then
              echo "::error::Commit $sha has an invalid message"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Some commit messages do not follow conventional commits format."
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi
